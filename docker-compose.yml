version: '3'

services:
  app:
    build: .
    # Map container port 8081 to host port 8081
    ports:
      - "8081:8081"
    networks:
      - examnet

  nginx:
    image: nginx:alpine
    # Serve Nginx on host port 8080
    ports:
      - "8080:80"
    depends_on:
      - app
    networks:
      - examnet

networks:
  examnet:
    driver: bridge # Use bridge networking between services
