name: Java CI

# Trigger workflow when code is pushed to the main branch
on:
  push:
    branches:
      - main

jobs:
  build:
    # Use the Ubuntu runner for the build environment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'

