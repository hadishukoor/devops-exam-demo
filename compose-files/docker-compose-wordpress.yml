version: '3'

services:

  webapp:
    image: wordpress
    ports:
      - "8090:80"
    depends_on:
      - database

  database:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpressdb
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: password

volumes:
  db_data:



